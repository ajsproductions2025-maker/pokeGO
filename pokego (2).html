<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokeGo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;padding:1rem}
.app{max-width:700px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;padding:.75rem 1.25rem;background:#fff;border-radius:14px;border:1px solid #e0e0d8;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{font-size:24px;font-weight:700;color:#1a1a1a;letter-spacing:-.5px}.logo span{color:#e03c3c}
.balls{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600;color:#1a1a1a}
.ball-svg{width:22px;height:22px;flex-shrink:0}
.tabs{display:flex;gap:8px;margin-bottom:1.25rem}
.tab{padding:8px 20px;border-radius:10px;border:1px solid #e0e0d8;background:#fff;cursor:pointer;font-size:14px;color:#666;transition:all .15s;font-weight:500}
.tab.active{background:#f0f0ea;color:#1a1a1a;border-color:#bbb;font-weight:600}
.section{display:none}.section.active{display:block}
.pack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem}
.pack-card{background:#fff;border:1px solid #e0e0d8;border-radius:14px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .15s;user-select:none;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.pack-card:hover{border-color:#aaa;background:#fafaf8;transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.08)}
.pack-card:active{transform:scale(.97)}
.pack-symbol{width:48px;height:48px;margin:0 auto 8px;display:block}
.pack-name{font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:3px}
.pack-cost{font-size:11px;color:#888;display:flex;align-items:center;justify-content:center;gap:3px}
.pack-rarity{font-size:10px;padding:2px 8px;border-radius:99px;margin-top:5px;display:inline-block;font-weight:500}
.r-common{background:#e8f0e8;color:#2d6e2d}.r-uncommon{background:#e0eaf5;color:#1a5fa0}.r-rare{background:#ede0f7;color:#6a2ba8}.r-epic{background:#fdefd6;color:#b05e00}.r-legendary{background:#fce8e8;color:#a01a1a}
.rates-row{font-size:10px;color:#aaa;margin-top:4px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center}
.tier-label{font-size:12px;font-weight:600;color:#888;margin-bottom:8px;margin-top:.75rem;display:flex;align-items:center;gap:8px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:100}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:20px;padding:2rem 1.75rem;max-width:320px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-pack-label{font-size:12px;color:#888;margin-bottom:6px}
.modal-pokemon-img{width:120px;height:120px;object-fit:contain;margin:0 auto 6px;display:block;image-rendering:pixelated}
.modal-pokemon-name{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:3px;text-transform:capitalize}
.modal-pokemon-type{font-size:13px;color:#888;margin-bottom:6px}
.modal-stage-badge{font-size:11px;padding:2px 10px;border-radius:99px;background:#f0f0ea;color:#666;border:1px solid #e0e0d8;margin-bottom:8px;display:inline-block}
.modal-stat-row{display:flex;justify-content:center;gap:12px;margin:.5rem 0}
.stat-box{background:#f5f5f0;border:1px solid #e0e0d8;border-radius:8px;padding:5px 12px;text-align:center;min-width:56px}
.stat-box b{display:block;font-size:16px;font-weight:700;color:#1a1a1a}
.stat-box span{font-size:10px;color:#888}
.close-btn{width:100%;padding:10px;border:1px solid #ddd;background:#f5f5f0;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:#1a1a1a;margin-top:.75rem}
.close-btn:hover{background:#eee}
/* Collection */
.collection-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-bottom:1.25rem}
.mon-card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:10px 6px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.mon-card img{width:64px;height:64px;object-fit:contain;display:block;margin:0 auto;image-rendering:pixelated}
.mon-card .name{font-size:11px;color:#555;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.mon-card .cnt{font-size:10px;color:#aaa}
.empty-state{text-align:center;padding:3rem 1rem;color:#888;font-size:15px}
/* Toast */
.toast{background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:99px;font-size:13px;text-align:center;margin-bottom:1rem;display:none;font-weight:500}
.toast.show{display:block}
/* Battle */
.battle-arena{background:#fff;border-radius:14px;border:1px solid #e0e0d8;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.fighters{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:1.25rem}
.fighter{background:#f9f9f6;border-radius:12px;border:1px solid #e0e0d8;padding:.9rem;text-align:center}
.fighter-label{font-size:10px;color:#888;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.fighter img{width:72px;height:72px;object-fit:contain;display:block;margin:0 auto 5px;image-rendering:pixelated}
.fighter-name{font-size:12px;font-weight:600;color:#1a1a1a;text-transform:capitalize}
.fighter-type{font-size:10px;color:#888}
.fighter-stats{display:flex;justify-content:center;gap:8px;margin-top:4px;font-size:10px;color:#aaa}
.hp-bar-wrap{height:7px;background:#eee;border-radius:99px;margin-top:7px;overflow:hidden}
.hp-bar{height:100%;border-radius:99px;transition:width .4s ease}
.hp-text{font-size:10px;color:#888;margin-top:2px}
.vs-badge{font-size:18px;font-weight:700;color:#ccc}
.rival-badge{font-size:10px;padding:2px 8px;border-radius:99px;display:inline-block;margin-top:3px;font-weight:500}
.rb-easy{background:#eaf3de;color:#27500a}.rb-medium{background:#fdefd6;color:#b05e00}.rb-hard{background:#fcebeb;color:#791f1f}
.battle-log{background:#f9f9f6;border:1px solid #e0e0d8;border-radius:10px;padding:10px 14px;min-height:80px;max-height:130px;overflow-y:auto;font-size:12px;line-height:1.7;margin-bottom:.75rem}
.log-entry{padding:1px 0;border-bottom:1px solid #f0f0ea;color:#888}
.log-entry:last-child{border-bottom:none;color:#1a1a1a;font-weight:600}
.battle-result{text-align:center;padding:1rem;border-radius:10px;margin-bottom:.75rem}
.result-win{background:#eaf3de;border:1px solid #97c459;color:#27500a}
.result-lose{background:#fcebeb;border:1px solid #f09595;color:#791f1f}
.result-fled{background:#eaf3de;border:1px solid #97c459;color:#27500a}
.result-title{font-size:20px;font-weight:700;margin-bottom:4px}
.result-sub{font-size:13px}
.battle-btns{display:flex;gap:8px}
.battle-btns button{flex:1;padding:10px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;border:1px solid #ddd;background:#fff;color:#1a1a1a;transition:background .15s}
.battle-btns button:hover{background:#f5f5f0}
.battle-btns button:disabled{opacity:.4;cursor:not-allowed}
.atk-btn{background:#fff0f0!important;border-color:#f09595!important;color:#a01a1a!important}
.flee-safe{background:#eaf3de!important;border-color:#97c459!important;color:#27500a!important}
.flee-warn{background:#fdefd6!important;border-color:#ef9f27!important;color:#b05e00!important}
.pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.pick-mon{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:9px 5px;text-align:center;cursor:pointer;transition:all .15s}
.pick-mon:hover{border-color:#aaa;background:#fafaf8}
.pick-mon.selected{border:2px solid #4a90d9;background:#eef4fc}
.pick-mon img{width:52px;height:52px;object-fit:contain;display:block;margin:0 auto;image-rendering:pixelated}
.pick-mon .name{font-size:11px;color:#555;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.consequence-note{font-size:11px;padding:6px 10px;border-radius:8px;margin-bottom:.75rem;text-align:center;font-weight:500}
.cn-flee-safe{background:#eaf3de;color:#27500a;border:1px solid #97c459}
.cn-flee-warn{background:#fdefd6;color:#b05e00;border:1px solid #ef9f27}
.hit-flash{animation:flash .25s}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.15}}
.info-bar{font-size:11px;color:#888;background:#fff;padding:8px 12px;border-radius:10px;margin-bottom:1rem;border:1px solid #e0e0d8;line-height:1.8}
/* Energy */
.energy-bar{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#1a6fc4}
.attack-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:.75rem}
.attack-btn-card{border-radius:10px;border:1.5px solid #e0e0d8;padding:9px 10px;cursor:pointer;text-align:left;background:#fff;transition:all .15s}
.attack-btn-card:hover:not([disabled]){border-color:#aaa;background:#fafaf8}
.attack-btn-card[disabled]{opacity:.45;cursor:not-allowed}
.attack-btn-card.free-move{border-color:#c0dd97;background:#f4faea}
.attack-btn-card.free-move:hover:not([disabled]){border-color:#639922;background:#eaf3de}
.atk-name{font-size:12px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.atk-meta{font-size:10px;color:#888;display:flex;gap:6px;align-items:center}
.atk-dmg{font-weight:600;color:#c82020}
.atk-cost-free{color:#27500a;font-weight:600}
.atk-cost-paid{color:#1a6fc4;font-weight:600}
.energy-store-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:1.5rem}
.energy-card{background:#fff;border:1px solid #e0eaf5;border-radius:14px;padding:14px 12px;cursor:pointer;text-align:center;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.energy-card:hover{border-color:#4a90d9;background:#f0f6ff}
.energy-card-name{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.energy-card-amount{font-size:20px;font-weight:700;color:#1a6fc4;margin-bottom:4px}
.energy-card-cost{font-size:12px;color:#888;display:flex;align-items:center;justify-content:center;gap:3px}
</style>
</head>

        <path d="M2 20 Q2 38 20 38 Q38 38 38 20Z" fill="white"/>
        <line x1="2" y1="20" x2="38" y2="20" stroke="#222" stroke-width="2.5"/>

        <circle cx="20" cy="20" r="2.5" fill="#222"/>
      </svg>
      <span id="ball-count">100</span> Pokéballs
    </div>
    <div class="energy-bar">

    <button class="tab active" onclick="showTab('shop',this)">Shop</button>
    <button class="tab" onclick="showTab('collection',this)">Collection</button>
    <button class="tab" onclick="showTab('battle',this)">Battle</button>
    <button class="tab" onclick="showTab('energy',this)">⚡ Energy</button>
  </div>
  <div id="toast" class="toast"></div>
  <div id="shop" class="section active"></div>
  <div id="collection" class="section"></div>
  <div id="battle" class="section"></div>
  <div id="energy" class="section"></div>
</div>

<!-- Pack Open Modal -->
<div class="modal-overlay" id="pack-modal">
  <div class="modal">
    <div class="modal-pack-label" id="pack-opened-label"></div>

    <div class="modal-pokemon-type" id="mon-type"></div>
    <div id="mon-stage-wrap"></div>
    <div class="modal-stat-row" id="mon-stats"></div>
    <span class="pack-rarity" id="mon-rarity-badge"></span>
    <div style="font-size:12px;color:#888;margin-top:8px" id="mon-dupe"></div>
    <button class="close-btn" onclick="closePackModal()">Nice!</button>
  </div>
</div>

// ── Tier / stat config ──────────────────────────────────────────────────────
const TIER_HP_CAP=[0,100,200,300,400,500];
const TIER_ATK_BASE=[0,[8,22],[18,38],[30,55],[45,75],[65,100]];

function rollStats(tier,stage){
  const cap=TIER_HP_CAP[tier];
  const sm=stage===1?1:stage===2?1.15:1.30;
  const [mn,mx]=TIER_ATK_BASE[tier];
  const hp=Math.min(Math.round((0.60+Math.random()*0.40)*cap*sm),Math.round(cap*sm));
  const atk=Math.round((mn+(Math.random()*(mx-mn)))*sm);
  return{hp,atk};
}

function pickRival(){
  const roll=Math.random();
  let pool;
  if(roll<.40)pool=ALL_RIVAL.filter(r=>r.tier===1);
  else if(roll<.65)pool=ALL_RIVAL.filter(r=>r.tier===2);
  else if(roll<.82)pool=ALL_RIVAL.filter(r=>r.tier===3);
  else if(roll<.93)pool=ALL_RIVAL.filter(r=>r.tier===4);
  else pool=ALL_RIVAL.filter(r=>r.tier===5);
  const base=pool[Math.floor(Math.random()*pool.length)];
  const s=rollStats(base.tier,2);
  const lbl=base.tier<=2?'Easy':base.tier===3?'Medium':base.tier===4?'Hard':'Brutal';
  const cls=base.tier<=2?'rb-easy':base.tier===3?'rb-medium':'rb-hard';
  return{...base,...s,maxHp:s.hp,label:lbl,labelClass:cls,img:`${SPRITE_BASE}${base.dex}.png`};
}

let balls=100,collection={},battleState=null,selectedMon=null;

function pickPokemon(pool){
  const list=P[pool];
  const tot=list.reduce((a,m)=>a+m.w,0);
  let r=Math.random()*tot;
  for(let i=0;i<list.length;i++){r-=list[i].w;if(r<=0)return list[i];}
  return list[list.length-1];
}

function openPack(pack){
  if(balls<pack.cost){showToast('Not enough Pokéballs!');return;}
  balls-=pack.cost;updateBalls();
  const base=pickPokemon(pack.pool);
  const stats=rollStats(base.tier,base.stage);
  const mon={...base,...stats};
  const isNew=!collection[mon.n];
  if(!collection[mon.n]||stats.hp>collection[mon.n].hp){collection[mon.n]={...mon,count:(collection[mon.n]?.count||0)+1};}
  else{collection[mon.n].count++;}
  document.getElementById('pack-opened-label').textContent='From: '+pack.name;
  const img=document.getElementById('mon-img');
  img.src=spriteUrl(mon.n);img.alt=mon.n;
  document.getElementById('mon-name').textContent=mon.n;
  document.getElementById('mon-type').textContent=mon.t;
  document.getElementById('mon-stage-wrap').innerHTML='<span class="modal-stage-badge">Stage '+mon.stage+(mon.stage===1?' — Base':mon.stage===2?' — Evo 1':' — Final')+'</span>';
  document.getElementById('mon-stats').innerHTML='<div class="stat-box"><b>'+mon.hp+'</b><span>HP</span></div><div class="stat-box"><b>'+mon.atk+'</b><span>ATK</span></div>';
  const rb=document.getElementById('mon-rarity-badge');rb.textContent=mon.r;rb.className='pack-rarity r-'+mon.r.toLowerCase();
  document.getElementById('mon-dupe').textContent=isNew?'✨ New Pokémon!':'Already in collection';
  document.getElementById('pack-modal').classList.add('show');
}

function closePackModal(){
  document.getElementById('pack-modal').classList.remove('show');

function getMovesForMon(mon){
  // Use primary type (before /)
  const primaryType=mon.t.split('/')[0].trim();
  const moves=TYPE_MOVES[primaryType]||TYPE_MOVES["Normal"];
  return moves;
}

function getRivalMove(rival){
  // Rivals always use a free or low-energy move (they don't have energy constraints)
  const moves=TYPE_MOVES[rival.t.split('/')[0].trim()]||TYPE_MOVES["Normal"];
  // Rivals randomly pick any move but weighted toward free ones
  const roll=Math.random();
  if(roll<0.5)return moves[0]; // free move 1
  if(roll<0.75)return moves[1]; // free move 2
  if(roll<0.88)return moves[2]; // tier 1 energy
  if(roll<0.96)return moves[3]; // tier 2 energy
  return moves[4]; // big move
}

// ── Battle functions ────────────────────────────────────────────────────────
function startBattle(){
  if(!selectedMon)return;
  const rival=pickRival();
  rival.curHp=rival.hp;
  battleState={
    player:{...selectedMon,curHp:selectedMon.hp},
    rival,
    log:['A wild '+rival.n+' appeared! ('+rival.label+') Go, '+selectedMon.n+'!'],
    over:false,playerWon:false,turn:'player'
  };
  renderBattle();
}

function useMove(moveIdx){
  if(!battleState||battleState.over||battleState.turn!=='player')return;
  const{player,rival}=battleState;
  const moves=getMovesForMon(player);
  const move=moves[moveIdx];
  if(!move)return;
  if(move.energy>0&&energy<move.energy){showToast("Not enough energy! Need "+move.energy+" ⚡");return;}
  if(move.energy>0){energy-=move.energy;updateEnergy();}
  const variance=0.85+Math.random()*0.3;
  const dmg=Math.max(1,Math.round(player.atk*move.dmgMult*variance));
  rival.curHp=Math.max(0,rival.curHp-dmg);
  const energyNote=move.energy>0?(' (−'+move.energy+'⚡)'):'';
  battleState.log.push(player.n+' used '+move.name+' for '+dmg+' damage!'+energyNote);
  const rf=document.getElementById('rival-fig');
  if(rf){rf.classList.add('hit-flash');setTimeout(()=>rf.classList.remove('hit-flash'),280);}
  if(rival.curHp<=0){
    battleState.over=true;battleState.playerWon=true;
    battleState.log.push(rival.n+' fainted! You win! +20 Pokéballs!');
    balls+=20;updateBalls();renderBattle();return;
  }
  battleState.turn='rival';renderBattle();
  setTimeout(()=>{
    if(!battleState||battleState.over)return;
    const rMove=getRivalMove(rival);
    const rv=0.85+Math.random()*0.3;
    const rdmg=Math.max(1,Math.round(rival.atk*rMove.dmgMult*rv));
    player.curHp=Math.max(0,player.curHp-rdmg);
    battleState.log.push(rival.n+' used '+rMove.name+' for '+rdmg+' damage!');
    const pf=document.getElementById('player-fig');
    if(pf){pf.classList.add('hit-flash');setTimeout(()=>pf.classList.remove('hit-flash'),280);}
    if(player.curHp<=0){
      battleState.over=true;battleState.playerWon=false;
      const loss=Math.min(10,balls);balls=Math.max(0,balls-loss);updateBalls();
      battleState.log.push(player.n+' fainted! You lost '+loss+' Pokéballs.');
    }
    battleState.turn='player';renderBattle();
  },950);
}

function doFlee(){
  if(!battleState||battleState.over)return;
  battleState.log.push('You fled safely — no Pokéballs lost!');
  battleState.over=true;battleState.playerWon=false;battleState.fledSafely=true;
  renderBattle();
}

  arena.innerHTML=`<div class="fighters">
    <div class="fighter" id="player-fig">
      <div class="fighter-label">You · T${player.tier} S${player.stage}</div>
      <img src="${spriteUrl(player.n)}" alt="${player.n}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
      <div class="fighter-name">${player.n}</div>
      <div class="fighter-type">${player.t}</div>
      <div class="fighter-stats"><span>${player.hp}HP</span><span>${player.atk}ATK</span></div>
      <div class="hp-bar-wrap"><div class="hp-bar" style="width:${pPct}%;background:${hpColor(pPct)}"></div></div>
      <div class="hp-text">${player.curHp} / ${player.hp}</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="fighter" id="rival-fig">
      <div class="fighter-label">Rival · T${rival.tier}</div>
      <img src="${rival.img}" alt="${rival.n}" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/0.png'">
      <div class="fighter-name">${rival.n}</div>
      <div class="fighter-type">${rival.t}</div>
      <span class="rival-badge ${rival.labelClass}">${rival.label}</span>
      <div class="hp-bar-wrap"><div class="hp-bar" style="width:${rPct}%;background:${hpColor(rPct)}"></div></div>
      <div class="hp-text">${rival.curHp} / ${rival.hp}</div>
    </div>
  </div>`;
  b.appendChild(arena);

  const logEl=document.createElement('div');logEl.className='battle-log';
  log.forEach(l=>{const e=document.createElement('div');e.className='log-entry';e.textContent=l;logEl.appendChild(e);});
  b.appendChild(logEl);logEl.scrollTop=logEl.scrollHeight;

  if(over){
    const res=document.createElement('div');
    if(playerWon){res.className='battle-result result-win';res.innerHTML='<div class="result-title">Victory! 🎉</div><div class="result-sub">+20 Pokéballs earned!</div>';}
    else if(fledSafely){res.className='battle-result result-fled';res.innerHTML='<div class="result-title">Fled safely</div><div class="result-sub">No Pokéballs lost!</div>';}
    else{res.className='battle-result result-lose';res.innerHTML='<div class="result-title">Defeated</div><div class="result-sub">−10 Pokéballs.</div>';}
    b.appendChild(res);
    const btns=document.createElement('div');btns.className='battle-btns';
    btns.innerHTML='<button onclick="rematch()">Rematch</button><button onclick="newBattle()">Change Pokémon</button>';
    b.appendChild(btns);
  } else if(turn==='player'){
    // Energy display
    const enRow=document.createElement('div');
    enRow.style.cssText='font-size:12px;color:#1a6fc4;font-weight:600;margin-bottom:6px;text-align:right';
    enRow.textContent='⚡ '+energy+' energy';
    b.appendChild(enRow);
    // Move buttons
    const moves=getMovesForMon(player);
    const grid=document.createElement('div');grid.className='attack-grid';
    moves.forEach((mv,i)=>{
      const isFree=mv.energy===0;
      const canAfford=isFree||(energy>=mv.energy);
      const btn=document.createElement('button');
      btn.className='attack-btn-card'+(isFree?' free-move':'');
      btn.disabled=!canAfford;
      const costLabel=isFree?'<span class="atk-cost-free">FREE</span>':'<span class="atk-cost-paid">'+mv.energy+'⚡</span>';
      btn.innerHTML=`<div class="atk-name">${mv.name}</div><div class="atk-meta"><span class="atk-dmg">${mv.dmgMult}× ATK</span>${costLabel}</div>`;
      btn.title=mv.desc;
      btn.onclick=()=>useMove(i);
      grid.appendChild(btn);
    });
    b.appendChild(grid);
    const flee=document.createElement('button');
    flee.className='flee-safe';flee.style.cssText='width:100%;margin-top:8px;padding:9px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;border:1.5px solid #97c459;background:#eaf3de;color:#27500a';
    flee.textContent='Flee (free)';flee.onclick=doFlee;b.appendChild(flee);
  } else {
    const waiting=document.createElement('div');
    waiting.style.cssText='text-align:center;padding:1rem;color:#888;font-size:13px;font-weight:500';
    waiting.textContent='Rival is attacking…';
    b.appendChild(waiting);
  }
}

function rematch(){if(selectedMon)startBattle();}
function newBattle(){battleState=null;selectedMon=null;renderBattle();}

renderShop();renderCollection();renderEnergyStore();
</script>
</body>
</html>
